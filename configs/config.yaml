leagues:
  # football-data.co.uk league codes
  premier_league:
    code: "E0"
    name: "English Premier League"
    country: "England"
  championship:
    code: "E1"
    name: "English Championship"
    country: "England"
  serie_a:
    code: "I1"
    name: "Italian Serie A"
    country: "Italy"
  la_liga:
    code: "SP1"
    name: "Spanish La Liga"
    country: "Spain"
  bundesliga:
    code: "D1"
    name: "German Bundesliga"
    country: "Germany"
  ligue_1:
    code: "F1"
    name: "French Ligue 1"
    country: "France"

seasons:
  # football-data.co.uk season format
  - "2019-20"
  - "2020-21"
  - "2021-22"
  - "2022-23"
  - "2023-24"

data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  external_dir: "data/external"

features:
  form_window: 5            # last N matches for form calculation
  h2h_window: 10            # last N h2h matches
  fatigue_threshold: 4      # days since last match for fatigue flag
  min_matches_for_form: 3   # minimum matches before calculating form

models:
  test_size: 0.2
  val_size: 0.1
  random_state: 42
  cv_folds: 5
  early_stopping_rounds: 50
  optuna_trials: 100

  xgboost:
    n_estimators: 500
    learning_rate: 0.05
    max_depth: 6
    subsample: 0.8
    colsample_bytree: 0.8
    min_child_weight: 3
    gamma: 0.1
    reg_alpha: 0.1
    reg_lambda: 1.0

  lightgbm:
    n_estimators: 500
    learning_rate: 0.05
    num_leaves: 63
    max_depth: -1
    min_child_samples: 20
    subsample: 0.8
    colsample_bytree: 0.8
    reg_alpha: 0.1
    reg_lambda: 1.0

  ensemble:
    xgb_weight: 0.5
    lgbm_weight: 0.5

betting:
  min_value_threshold: 0.05    # minimum edge over implied probability
  kelly_fraction: 0.25          # fractional Kelly criterion (conservative)
  max_bet_fraction: 0.05        # max 5% of bankroll per bet
  min_odds: 1.5                 # minimum acceptable odds
  max_odds: 10.0                # maximum acceptable odds
  initial_bankroll: 1000.0      # starting bankroll for backtest

bookmakers:
  # column prefixes from football-data.co.uk
  - "B365"    # Bet365
  - "BW"      # BetWin
  - "IW"      # Interwetten
  - "PS"      # Pinnacle
  - "WH"      # William Hill
  - "VC"      # VC Bet
  - "Max"     # Market max
  - "Avg"     # Market average

api_football:
  base_url: "https://v3.football.api-sports.io"
  # set API_FOOTBALL_KEY in .env

understat:
  base_url: "https://understat.com"
  leagues:
    - "EPL"
    - "La_liga"
    - "Bundesliga"
    - "Serie_A"
    - "Ligue_1"
